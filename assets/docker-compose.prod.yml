# TG Signer 增强版 - 生产环境Docker Compose配置
# 包含WebUI、数据库和监控的完整解决方案

version: '3.8'

services:
  # WebUI服务
  webui:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: tg-signer-enhanced:latest
    container_name: tg-signer-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Telegram API设置 (必需)
      - TG_API_ID=${TG_API_ID}
      - TG_API_HASH=${TG_API_HASH}

      # 安全认证 (推荐设置)
      - TG_SIGNER_GUI_AUTHCODE=${TG_SIGNER_GUI_AUTHCODE}

      # 网络和代理 (可选)
      - TG_PROXY=${TG_PROXY:-}

      # 应用配置
      - NICEGUI_RELOAD=false
      - UVICORN_WORKERS=4
      - UVICORN_LOG_LEVEL=info
      - PYTHONUNBUFFERED=1
    volumes:
      # 数据持久化
      - tg_signer_data:/app/.signer

      # 日志持久化 (可选)
      - ./logs:/app/.signer/logs

      # 配置文件挂载 (可选)
      - ./config:/app/config:ro
    networks:
      - tg-signer-network
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 数据库服务 (可选，用于存储配置和状态)
  db:
    image: postgres:15-alpine
    container_name: tg-signer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tg_signer
      POSTGRES_USER: ${DB_USER:-tgsigner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - tg-signer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 反向代理 (推荐使用Nginx或Traefik)
  nginx:
    image: nginx:alpine
    container_name: tg-signer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - tg-signer-network
    depends_on:
      - webui
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Redis缓存 (可选，用于会话管理)
  redis:
    image: redis:7-alpine
    container_name: tg-signer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - tg-signer-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Prometheus监控 (可选)
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: tg-signer-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - tg-signer-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Grafana仪表板 (可选)
  grafana:
    image: grafana/grafana:10.0.0
    container_name: tg-signer-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - tg-signer-network
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  tg-signer-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  # 数据卷
  tg_signer_data:
    name: tg_signer_data
    driver: local
    driver_opts:
      type: none
      device: /opt/tg-signer/data
      o: bind

  pg_data:
    name: tg_signer_pg_data
    driver: local
    driver_opts:
      type: none
      device: /opt/tg-signer/db
      o: bind

  redis_data:
    name: tg_signer_redis_data
    driver: local
    driver_opts:
      type: none
      device: /opt/tg-signer/redis
      o: bind

  prometheus_data:
    name: tg_signer_prometheus_data
    driver: local
    driver_opts:
      type: none
      device: /opt/tg-signer/monitoring/prometheus
      o: bind

  grafana_data:
    name: tg_signer_grafana_data
    driver: local
    driver_opts:
      type: none
      device: /opt/tg-signer/monitoring/grafana
      o: bind

  nginx_cache:
    name: tg_signer_nginx_cache
    driver: local
    driver_opts:
      type: none
      device: /opt/tg-signer/cache/nginx
      o: bind


# === 使用说明 ===

# 1. 复制环境变量文件
# cp .env.example .env
# 编辑 .env 文件设置必要的变量

# 2. 启动所有服务
# docker-compose -f docker-compose.prod.yml up -d

# 3. 查看日志
# docker-compose -f docker-compose.prod.yml logs -f webui

# 4. 停止服务
# docker-compose -f docker-compose.prod.yml down

# 5. 备份数据
# docker run --rm \
#   -v tg_signer_data:/data \
#   -v $(pwd)/backups:/backup \
#   alpine tar czf /backup/tg-signer-data-$(date +%Y%m%d).tar.gz /data

# 6. 更新服务
# docker-compose -f docker-compose.prod.yml pull
# docker-compose -f docker-compose.prod.yml up -d


# === 环境变量说明 ===

# 必需变量:
# TG_API_ID=your_api_id
# TG_API_HASH=your_api_hash

# 推荐变量:
# TG_SIGNER_GUI_AUTHCODE=strong_password
# DB_PASSWORD=strong_db_password
# REDIS_PASSWORD=strong_redis_password
# GF_ADMIN_PASSWORD=grafana_admin_password

# 可选变量:
# TG_PROXY=socks5://127.0.0.1:1080
# NICEGUI_PORT=9000
# UVICORN_WORKERS=8


# === 安全建议 ===

# 1. 使用强密码
# openssl rand -base64 32 > authcode.txt

# 2. 限制网络访问
# docker network create --internal tg-signer-internal
# docker network disconnect tg-signer-network webui
# docker network connect tg-signer-internal webui

# 3. 资源限制
# docker-compose -f docker-compose.prod.yml run --memory="2g" --cpus="1.5" webui

# 4. 只读文件系统
# docker run --read-only --tmpfs /tmp --tmpfs /app/.signer webui

# 5. 定期更新
# docker-compose -f docker-compose.prod.yml pull && docker-compose -f docker-compose.prod.yml up -d


