name: Sync Upstream + Multiarch Build Push

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout my fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Sync with upstream
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote add upstream https://github.com/amchii/tg-signer.git || true
          git fetch upstream

          git checkout main
          
          # 🔥 关键：合并时 跳过 官方 docker 文件夹，不覆盖你的配置
          git merge upstream/main --no-commit --allow-unrelated-histories
          
          # 🔥 强制保留我们自己的文件，放弃上游的 docker/ 目录
          git checkout HEAD -- docker/ 2>/dev/null || true
          rm -rf docker/
          git add .
          
          git commit -m "sync upstream, skip official docker folder" || true
          git push origin main

      - name: Set version
        id: version
        run: |
          echo "VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/tg-signer:latest
            ${{ secrets.DOCKER_USERNAME }}/tg-signer:${{ steps.version.outputs.VERSION }}